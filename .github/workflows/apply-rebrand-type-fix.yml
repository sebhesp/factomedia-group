name: Apply rebrand type fix

on:
  push:
    branches: [branding/el-facto-noticias]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[type fix applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: branding/el-facto-noticias
          fetch-depth: 0
          show-progress: false

      - name: Apply type fix
        run: node scripts/fix-rebrand-types.mjs

      - name: Commit type fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Fix El Facto Noticias rebrand types [type fix applied]"
          git push origin HEAD:branding/el-facto-noticias

name: Publish current El Facto Noticias preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: temporary-el-facto-pages-publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout preview branch
        uses: actions/checkout@v4
        with:
          ref: ops/publish-current-main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build static site
        env:
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: |
          set -o pipefail
          npm run build 2>&1 | tee static-build-report.txt
          find out -maxdepth 4 -type f | sort > static-output-files.txt
          test -f out/index.html
          test -f out/instagram/index.html
          touch out/.nojekyll

      - name: Upload static export diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-export-diagnostics
          path: |
            static-build-report.txt
            static-output-files.txt
          if-no-files-found: ignore

      - name: Publish gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+users.noreply.github.com"
          git add --all
          git commit -m "Deploy Instagram copy workspace"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

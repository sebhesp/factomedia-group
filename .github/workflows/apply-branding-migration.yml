name: Apply El Facto Noticias branding migration

on:
  push:
    branches: [branding/el-facto-noticias]

permissions:
  contents: write

jobs:
  migrate:
    if: ${{ !contains(github.event.head_commit.message, '[branding applied]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branding branch
        uses: actions/checkout@v4
        with:
          ref: branding/el-facto-noticias
          fetch-depth: 0
          show-progress: false

      - name: Apply controlled rebrand
        run: node scripts/apply-el-facto-branding.mjs

      - name: Validate legacy branding is gone
        run: node scripts/check-branding.mjs

      - name: Commit migrated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No branding changes required."
            exit 0
          fi
          git commit -m "Apply El Facto Noticias branding [branding applied]"
          git push origin HEAD:branding/el-facto-noticias

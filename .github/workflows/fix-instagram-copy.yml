name: Fix Instagram copy desk syntax

on:
  push:
    branches: [feature/instagram-copy-desk]

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[syntax fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/instagram-copy-desk
      - name: Fix class expression
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/instagram-engine.tsx')
          text = path.read_text()
          old = 'className={`ig-copy-field${wide ? " wide" : "}`}'
          new = 'className={`ig-copy-field${wide ? " wide" : ""}`}'
          if old not in text:
              raise SystemExit('Target expression not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/instagram-engine.tsx
          git commit -m "Fix Instagram copy field syntax [syntax fixed]"
          git push origin HEAD:feature/instagram-copy-desk

name: Validate self-learning build

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    if: contains(github.event.issue.title, 'Validate self-learning implementation')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Validate and report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set +e
          {
            echo '## TypeScript'
            npm run typecheck
            TYPECHECK=$?
            echo '## ESLint'
            npm run lint
            LINT=$?
            echo '## Tests'
            npm test
            TESTS=$?
            echo '## Static build'
            GITHUB_ACTIONS=true CI=true npm run build
            BUILD=$?
            echo "RESULTS typecheck=$TYPECHECK lint=$LINT tests=$TESTS build=$BUILD"
            if [ "$TYPECHECK" -eq 0 ] && [ "$LINT" -eq 0 ] && [ "$TESTS" -eq 0 ] && [ "$BUILD" -eq 0 ]; then
              exit 0
            fi
            exit 1
          } > validation.log 2>&1
          STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            printf '✅ Validación completa aprobada. TypeScript, ESLint, pruebas y build estático pasaron.\n' > issue-comment.md
          else
            printf '❌ La validación encontró errores. Últimas líneas del registro:\n\n```text\n' > issue-comment.md
            tail -n 140 validation.log >> issue-comment.md
            printf '\n```\n' >> issue-comment.md
          fi
          gh issue comment "$ISSUE_NUMBER" --body-file issue-comment.md
          exit "$STATUS"

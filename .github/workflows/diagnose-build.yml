name: Diagnose Factomedia build

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: startsWith(github.event.issue.title, '[diagnose]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci > install.log 2>&1

      - name: Typecheck
        id: typecheck
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Lint
        id: lint
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm run lint > lint.log 2>&1

      - name: Tests
        id: tests
        if: steps.install.outcome == 'success'
        continue-on-error: true
        run: npm test > tests.log 2>&1

      - name: Static build
        id: build
        if: steps.install.outcome == 'success'
        continue-on-error: true
        env:
          GITHUB_ACTIONS: 'true'
          CI: 'true'
        run: npm run build > build.log 2>&1

      - name: Comment diagnostic result
        uses: actions/github-script@v7
        env:
          INSTALL_OUTCOME: ${{ steps.install.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TESTS_OUTCOME: ${{ steps.tests.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        with:
          script: |
            const fs = require('fs');
            const read = (name) => {
              if (!fs.existsSync(name)) return '(no output)';
              const text = fs.readFileSync(name, 'utf8');
              return text.slice(-12000);
            };
            const body = [
              '## Factomedia build diagnostic',
              '',
              `- install: **${process.env.INSTALL_OUTCOME}**`,
              `- typecheck: **${process.env.TYPECHECK_OUTCOME || 'skipped'}**`,
              `- lint: **${process.env.LINT_OUTCOME || 'skipped'}**`,
              `- tests: **${process.env.TESTS_OUTCOME || 'skipped'}**`,
              `- build: **${process.env.BUILD_OUTCOME || 'skipped'}**`,
              '',
              '<details><summary>Install</summary>',
              '', '```text', read('install.log'), '```', '</details>',
              '', '<details><summary>Typecheck</summary>',
              '', '```text', read('typecheck.log'), '```', '</details>',
              '', '<details><summary>Lint</summary>',
              '', '```text', read('lint.log'), '```', '</details>',
              '', '<details><summary>Tests</summary>',
              '', '```text', read('tests.log'), '```', '</details>',
              '', '<details><summary>Build</summary>',
              '', '```text', read('build.log'), '```', '</details>'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Fail when validation failed
        if: always()
        run: |
          test "${{ steps.install.outcome }}" = "success"
          test "${{ steps.typecheck.outcome }}" = "success"
          test "${{ steps.lint.outcome }}" = "success"
          test "${{ steps.tests.outcome }}" = "success"
          test "${{ steps.build.outcome }}" = "success"

name: Build and publish Factomedia

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: factomedia-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Install dependencies
        run: npm install --no-audit --no-fund

      - name: 4. Validate code
        run: |
          npm run typecheck
          npm run lint
          npm test

      - name: 5. Build static website
        env:
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: |
          npm run build
          test -f out/index.html
          touch out/.nojekyll

      - name: 6. Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false

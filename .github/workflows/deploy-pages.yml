name: Build and publish El Facto Noticias

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: el-facto-noticias-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 3. Install dependencies
        run: npm install --no-audit --no-fund

      - name: 4. Validate code, branding and environment template
        run: |
          npm run check:branding
          npm run check:readiness:template
          npm run typecheck
          npm run lint
          npm test

      - name: 5. Prepare static route configuration
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/app/noticias/[slug]/page.tsx')
          text = path.read_text()
          expected = 'export const dynamicParams = true;'
          if expected not in text:
              raise SystemExit('Dynamic route marker not found')
          path.write_text(text.replace(expected, 'export const dynamicParams = false;', 1))
          PY

      - name: 6. Build static website
        env:
          GITHUB_ACTIONS: "true"
          CI: "true"
        run: |
          npm run build
          test -f out/index.html
          test -f out/instagram/index.html
          touch out/.nojekyll

      - name: 7. Publish gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy El Facto Noticias static site"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

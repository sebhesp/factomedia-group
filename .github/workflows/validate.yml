name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branding:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Validate El Facto Noticias branding
        run: node scripts/check-branding.mjs

      - name: Validate production environment template
        run: node scripts/check-production-readiness.mjs --template

  quality:
    needs: branding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck 2>&1 | tee typecheck-report.txt

      - name: Upload typecheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-report
          path: typecheck-report.txt
          if-no-files-found: ignore

      - name: Lint
        run: npm run lint 2>&1 | tee lint-report.txt

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-report.txt
          if-no-files-found: ignore

      - name: Test
        run: npm test

      - name: Build static application
        run: npm run build 2>&1 | tee build-report.txt
        env:
          GITHUB_ACTIONS: "true"

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.txt
          if-no-files-found: ignore

name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branding:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Generate branding report
        run: node scripts/check-branding.mjs > branding-report.txt 2>&1 || true

      - name: Upload branding report
        uses: actions/upload-artifact@v4
        with:
          name: branding-report
          path: branding-report.txt
          if-no-files-found: error

      - name: Validate El Facto Noticias branding
        run: node scripts/check-branding.mjs

  quality:
    needs: branding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build static application
        run: npm run build
        env:
          GITHUB_ACTIONS: "true"
